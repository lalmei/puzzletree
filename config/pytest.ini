[pytest]
python_files =
  test_*.py
  *_test.py
addopts =
  -vvv
  --cov
  --cov-config config/coverage.ini
  --cov-report xml
  --cov-report html
  --cov-report term-missing
  --color=yes
  --show-capture=all
testpaths =
  tests/
pythonpath =
  src/

filterwarnings =
  error
  ignore::DeprecationWarning
  ignore::PendingDeprecationWarning
  # Ignore specific warnings that are not actionable
  ignore:.*rsyncdir:DeprecationWarning:xdist
  ignore:.*pkg_resources:DeprecationWarning
  ignore:.*imp module:DeprecationWarning
  ignore:.*distutils:DeprecationWarning
  # Ignore unraisable exception warnings from copier library
  ignore:Exception ignored in.*:pytest.PytestUnraisableExceptionWarning
  ignore:.*unclosed scandir iterator.*:ResourceWarning
  # pydantic-settings json_file without JsonConfigSettingsSource
  ignore:Config key.*json_file.*:UserWarning
