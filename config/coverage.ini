
[run]
branch = true
parallel = true
source =
  src/puzzler
data_file = .coverage
omit =
  src/puzzler/__init__.py
  src/puzzler/__main__.py
  src/puzzler/main_template/*
  tests/__init__.py
  tests/conftest.py

[paths]
equivalent =
  src/
  .venv/lib/*/site-packages/
  .venvs/*/lib/*/site-packages/

[report]
format = text
precision = 2
# Full template (RAG + datasets) yields ~73% with existing tests; keep threshold achievable for CI
fail_under = 70
show_missing = true
skip_covered = false
sort = Cover
exclude_lines =
  pragma: no cover
  if TYPE_CHECKING:
  if __name__ == .__main__.:
  class .*\(Protocol\):
  @(abc\.)?abstractmethod

[html]
directory = htmlcov
title = puzzler Coverage Report
show_contexts = true

[xml]
output = coverage.xml

[json]
output = coverage.json