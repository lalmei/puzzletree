name: docs

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main
  workflow_dispatch:

defaults:
  run:
    shell: bash

env:
  LANG: en_US.utf-8
  LC_ALL: en_US.utf-8
  PYTHONIOENCODING: UTF-8

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: pyproject.toml

    - name: Install dependencies
      run: make setup

    - name: Run tests for coverage artifacts
      run: make test

    - name: Prepare coverage assets for Pages
      run: |
        rm -rf docs/coverage
        cp -R htmlcov docs/coverage
        python scripts/generate_coverage_badge.py coverage.xml docs/coverage-badge.json

    - name: Check docs in strict mode
      run: uv run mkdocs build --config-file=config/mkdocs.yml --strict

    - name: Upload Pages artifact
      if: github.event_name != 'pull_request'
      uses: actions/upload-pages-artifact@v3
      with:
        path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs:
    - build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
